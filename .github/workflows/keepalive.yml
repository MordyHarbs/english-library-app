name: keepalive
# Pings the database twice a week so the Supabase free project never auto-pauses.
on:
  schedule:
    - cron: '0 6 * * 1,4' # Mon & Thu 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/books?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          test "$code" = "200"
