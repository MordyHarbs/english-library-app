name: keepalive
# Pings the database twice a week so the Supabase free project never auto-pauses.
on:
  schedule:
    - cron: '0 6 * * 1,4' # Mon & Thu 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Validate secrets
        run: |
          test -n "$SUPABASE_URL" || { echo "::error::Missing Actions secret SUPABASE_URL"; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "::error::Missing Actions secret SUPABASE_ANON_KEY"; exit 1; }
      - name: Ping REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/books?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          test "$code" = "200"
